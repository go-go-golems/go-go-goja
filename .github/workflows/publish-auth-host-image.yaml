name: publish-auth-host-image

on:
  pull_request:
    paths:
      - Dockerfile.auth-host
      - examples/xgoja/21-generated-host-auth/**
      - modules/**
      - pkg/**
      - go.mod
      - go.sum
      - deploy/gitops-targets.json
      - scripts/open_gitops_pr.py
      - .github/workflows/publish-auth-host-image.yaml
  push:
    branches:
      - main
    paths:
      - Dockerfile.auth-host
      - examples/xgoja/21-generated-host-auth/**
      - modules/**
      - pkg/**
      - go.mod
      - go.sum
      - deploy/gitops-targets.json
      - scripts/open_gitops_pr.py
      - .github/workflows/publish-auth-host-image.yaml
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: publish-auth-host-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run generated auth host smoke
        run: make -C examples/xgoja/21-generated-host-auth smoke

      - name: Define image metadata
        run: |
          echo "GHCR_IMAGE=ghcr.io/${{ github.repository_owner }}/go-go-goja-auth-host" >> "$GITHUB_ENV"
          echo "SHORT_SHA=sha-${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=go-go-goja-auth-host
            org.opencontainers.image.description=Generated xgoja OIDC auth host demo
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.auth-host
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test loaded image
        if: github.event_name == 'pull_request'
        run: |
          docker run --rm "${GHCR_IMAGE}:${SHORT_SHA}" --help

  gitops-pr:
    name: Open GitOps PR
    needs: docker
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Read GitHub App credentials from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.yolo.scapegoat.dev
          method: jwt
          path: github-actions
          role: go-go-goja-gitops-pr
          jwtGithubAudience: https://vault.yolo.scapegoat.dev
          exportToken: true
          secrets: |
            kv/data/ci/github/tiny-idp/gitops-pr-app app_id | GITOPS_APP_ID ;
            kv/data/ci/github/tiny-idp/gitops-pr-app private_key | GITOPS_APP_PRIVATE_KEY

      - name: Mint GitHub App token for GitOps repository
        id: gitops-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.GITOPS_APP_ID }}
          private-key: ${{ env.GITOPS_APP_PRIVATE_KEY }}
          owner: wesen
          repositories: 2026-03-27--hetzner-k3s

      - name: Open GitOps pull request for published image
        env:
          GH_TOKEN: ${{ steps.gitops-app-token.outputs.token }}
          GITOPS_PR_GIT_AUTHOR_NAME: github-actions[bot]
          GITOPS_PR_GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/go-go-goja-auth-host
        run: |
          image_tag="sha-${GITHUB_SHA::7}"
          python3 scripts/open_gitops_pr.py \
            --config deploy/gitops-targets.json \
            --target goja-auth-host-demo \
            --image "${GHCR_IMAGE}:${image_tag}" \
            --push \
            --open-pr
