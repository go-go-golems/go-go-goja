# Required schema selector. Step 06 keeps xgoja v2 and adds
# generated hostauth OIDC login backed by local Keycloak.
schema: xgoja/v2

# Snapshot-specific name for the browser-login Keycloak stage.
name: personal-knowledge-inbox-browser-login-keycloak

# Application identity for generated command/config metadata.
app:
  name: personal-knowledge-inbox-browser-login-keycloak

# Generated Go module settings for this tutorial snapshot.
go:
  module: xgoja.generated/personal-knowledge-inbox-browser-login-keycloak
  version: "1.26"

# Workspace resolution strategy for local tutorial builds.
workspace:
  mode: auto

# Providers used in Step 06:
#   - host: database, guarded fetch, and embedded asset filesystem
#   - hostauth: Go-owned OIDC login, sessions, CSRF, and auth stores
#   - http: Express runtime module and provider-backed serve command
providers:
  - id: go-go-goja-host
    import: github.com/go-go-golems/go-go-goja/pkg/xgoja/providers/host
    register: Register
  - id: go-go-goja-hostauth
    import: github.com/go-go-golems/go-go-goja/pkg/xgoja/providers/hostauth
    register: Register
  - id: go-go-goja-http
    import: github.com/go-go-golems/go-go-goja/pkg/xgoja/providers/http
    register: Register

# Runtime modules define what JavaScript can require(). Native login/session
# endpoints are Go-owned and mounted by the generated serve host; this step does
# not expose the hostauth `auth` JavaScript module to direct CLI verbs yet.
runtime:
  modules:
    - provider: go-go-goja-host
      name: database
      as: database
      config:
        allowConfigure: true
    - provider: go-go-goja-host
      name: fs
      as: fs:assets
      config:
        embedded:
          allow: true
          mounts:
            - asset: ui-assets
              mount: /app
    - provider: go-go-goja-http
      name: express
      config:
        reject-raw-routes: true
        dev-errors: false

# Step 06 uses Keycloak as the tutorial identity provider. The generated host
# owns OIDC redirects, callback handling, opaque app-session cookies, CSRF, and
# app-local user upsert. Human passwords stay in Keycloak, not in xgoja.
auth:
  mode: oidc
  session:
    cookie:
      # Local tutorial runs use plain HTTP on 127.0.0.1. Do not enable this for
      # production deployments; use HTTPS instead.
      allow-insecure-http: true
  stores:
    default:
      # SQLite keeps the tutorial self-contained while still making app users,
      # sessions, audit records, and auth data survive a process restart.
      driver: sqlite
      dsn: personal-inbox-auth.sqlite
      apply-schema: true
  oidc:
    issuer-url: http://127.0.0.1:18086/realms/personal-inbox
    client-id: personal-inbox-local
    public-base-url: http://127.0.0.1:18793
    after-login-url: /
    after-logout-url: /

# Step 06 source layout:
#   inbox-verbs    JavaScript server/client verbs and reusable libs
#   ui-assets      static HTML/CSS/JS embedded into the generated binary
sources:
  - id: inbox-verbs
    kind: jsverbs
    from:
      dir: ./verbs
    include:
      - server.js
      - client.js
      - lib/inbox_store.js
    language: javascript
  - id: ui-assets
    kind: assets
    from:
      dir: ./assets

# Commands keep both surfaces:
#   - `verbs inboxctl ...` runs API client commands
#   - `serve inbox server ...` starts the API/UI server with native auth endpoints
commands:
  - id: verbs
    type: builtin.jsverbs
    name: verbs
    sources:
      - inbox-verbs
  - id: http-serve
    type: provider.command-set
    name: serve
    mount: serve
    provider: go-go-goja-http
    sources:
      - inbox-verbs

# Binary artifact for the Step 06 snapshot.
artifacts:
  - id: binary
    type: binary
    output: dist/personal-knowledge-inbox-browser-login-keycloak
    sources:
      - inbox-verbs
      - ui-assets
  - id: embedded-ui-assets
    type: embedded-assets
    sources:
      - ui-assets
