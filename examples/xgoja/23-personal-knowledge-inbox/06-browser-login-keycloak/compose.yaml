services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - "${KEYCLOAK_PORT:-18086}:8080"
    volumes:
      - ./keycloak/realm-personal-inbox.json:/opt/keycloak/data/import/realm-personal-inbox.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080; echo -e 'GET /realms/personal-inbox/.well-known/openid-configuration HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3; grep -q 'issuer' <&3"]
      interval: 5s
      timeout: 5s
      retries: 30
