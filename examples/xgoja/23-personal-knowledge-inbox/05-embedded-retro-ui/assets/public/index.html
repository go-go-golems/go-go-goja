<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Personal Knowledge Inbox</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="page">
    <section class="intro" aria-labelledby="title">
      <p class="eyebrow">xgoja tutorial · step 05</p>
      <h1 id="title">Personal Knowledge Inbox</h1>
      <p class="lede">Capture links into a tiny SQLite-backed inbox through a public tutorial API. The interface is deliberately simple: text first, thin rules, muted accents, no window chrome.</p>
    </section>

    <section class="capture" aria-labelledby="capture-title">
      <h2 id="capture-title">Capture</h2>
      <form id="capture-form">
        <label>
          <span>Title</span>
          <input name="title" autocomplete="off" required placeholder="A useful article" />
        </label>
        <label>
          <span>URL</span>
          <input name="url" type="url" required placeholder="https://example.com" />
        </label>
        <label>
          <span>Note</span>
          <textarea name="note" rows="3" placeholder="Why this belongs here"></textarea>
        </label>
        <button type="submit">Capture item</button>
      </form>
      <p id="status" class="status" role="status"></p>
    </section>

    <section class="inbox" aria-labelledby="inbox-title">
      <div class="section-heading">
        <h2 id="inbox-title">Inbox</h2>
        <button id="refresh" type="button" class="secondary">Refresh</button>
      </div>
      <ol id="items" class="items" aria-live="polite"></ol>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
