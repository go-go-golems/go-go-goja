# Required schema selector. Step 05 keeps xgoja v2 and adds embedded browser
# assets for a small monochrome-inspired UI.
schema: xgoja/v2

# Snapshot-specific name for the embedded UI stage.
name: personal-knowledge-inbox-embedded-ui

# Application identity for generated command/config metadata.
app:
  name: personal-knowledge-inbox-embedded-ui

# Generated Go module settings for this tutorial snapshot.
go:
  module: xgoja.generated/personal-knowledge-inbox-embedded-ui
  version: "1.26"

# Workspace resolution strategy for local tutorial builds.
workspace:
  mode: auto

# Providers used in Step 04:
#   - host: database for server persistence and fetch for client HTTP calls
#   - http: Express runtime module and provider-backed serve command
providers:
  - id: go-go-goja-host
    import: github.com/go-go-golems/go-go-goja/pkg/xgoja/providers/host
    register: Register
  - id: go-go-goja-http
    import: github.com/go-go-golems/go-go-goja/pkg/xgoja/providers/http
    register: Register

# Runtime modules define what JavaScript can require(). Step 05 adds a second
# fs module alias, `fs:assets`, mounted on embedded asset source `ui-assets`.
runtime:
  modules:
    - provider: go-go-goja-host
      name: database
      as: database
      config:
        allowConfigure: true
    - provider: go-go-goja-host
      name: fetch
      as: fetch
      config:
        allow: true
        allowedOrigins:
          - http://127.0.0.1:*
        timeout: 5s
        maxResponseBytes: 1048576
    - provider: go-go-goja-host
      name: fs
      as: fs:assets
      config:
        embedded:
          allow: true
          mounts:
            - asset: ui-assets
              mount: /app
    - provider: go-go-goja-http
      name: express
      config:
        reject-raw-routes: true
        dev-errors: false

# Step 05 source layout:
#   inbox-verbs    JavaScript server/client verbs and reusable libs
#   ui-assets      static HTML/CSS/JS embedded into the generated binary
sources:
  - id: inbox-verbs
    kind: jsverbs
    from:
      dir: ./verbs
    include:
      - server.js
      - client.js
      - lib/*.js
    language: javascript
  - id: ui-assets
    kind: assets
    from:
      dir: ./assets

# Commands keep both surfaces:
#   - `verbs inboxctl ...` runs API client commands
#   - `serve inbox server ...` starts the public API server
commands:
  - id: verbs
    type: builtin.jsverbs
    name: verbs
    sources:
      - inbox-verbs
  - id: http-serve
    type: provider.command-set
    name: serve
    mount: serve
    provider: go-go-goja-http
    sources:
      - inbox-verbs

# Binary artifact for the Step 04 snapshot.
artifacts:
  - id: binary
    type: binary
    output: dist/personal-knowledge-inbox-embedded-ui
    sources:
      - inbox-verbs
      - ui-assets
  - id: embedded-ui-assets
    type: embedded-assets
    sources:
      - ui-assets
