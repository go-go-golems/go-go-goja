schema: xgoja/v2
name: embedded-jsverbs
app:
    name: embedded-jsverbs
go:
    module: xgoja.generated/embedded-jsverbs
    version: "1.26"
workspace:
    mode: auto
providers:
    - id: fixture
      import: github.com/go-go-golems/go-go-goja/pkg/xgoja/testprovider
      register: Register
runtime:
    modules:
        - provider: fixture
          name: hello
          as: hello
sources:
    - id: local
      kind: jsverbs
      from:
        dir: ./verbs
      language: javascript
commands:
    - id: eval
      type: builtin.eval
      name: eval
    - id: run
      type: builtin.run
      name: run
    - id: repl
      type: builtin.repl
      name: repl
    - id: verbs
      type: builtin.jsverbs
      name: verbs
      sources:
        - local
artifacts:
    - id: binary
      type: binary
      output: dist/embedded-jsverbs
      sources:
        - local
