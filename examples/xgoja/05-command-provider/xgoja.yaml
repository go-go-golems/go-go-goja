schema: xgoja/v2
name: command-provider
app:
    name: command-provider
go:
    module: xgoja.generated/command-provider
    version: "1.26"
workspace:
    mode: auto
providers:
    - id: fixture
      import: github.com/go-go-golems/go-go-goja/pkg/xgoja/testprovider
      register: Register
runtime:
    modules:
        - provider: fixture
          name: hello
          as: hello
sources:
    - id: fixture-assets
      kind: assets
      from:
        dir: ./assets
commands:
    - id: fixture-tools
      type: provider.command-set
      name: tools
      mount: fixture
      provider: fixture
artifacts:
    - id: binary
      type: binary
      output: dist/command-provider
    - id: fixture-assets
      type: embedded-assets
      sources: [fixture-assets]
