name: command-provider
target:
  kind: xgoja
  output: dist/command-provider
packages:
- id: fixture
  import: github.com/go-go-golems/go-go-goja/pkg/xgoja/testprovider
commands:
  eval:
    enabled: false
  run:
    enabled: false
  repl:
    enabled: false
  jsverbs:
    enabled: false
commandProviders:
- id: fixture-tools
  package: fixture
  name: tools
  mount: fixture
modules:
- package: fixture
  name: hello
  as: hello
