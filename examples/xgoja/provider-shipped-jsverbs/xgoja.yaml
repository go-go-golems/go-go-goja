name: provider-shipped-jsverbs
target:
  kind: xgoja
  output: dist/provider-shipped-jsverbs
packages:
  - id: fixture
    import: github.com/go-go-golems/go-go-goja/pkg/xgoja/testprovider
runtimes:
  repl:
    modules:
      - package: fixture
        name: hello
        as: hello
      - package: fixture
        name: owner-check
        as: owner-check
commands:
  repl:
    enabled: true
    runtime: repl
  jsverbs:
    enabled: true
    runtime: repl
    name: verbs
jsverbs:
  - id: provider-defaults
    package: fixture
    source: verbs
