name: http-serve-jsverbs
target:
  kind: xgoja
  output: dist/http-serve-jsverbs
packages:
  - id: go-go-goja-http
    import: github.com/go-go-golems/go-go-goja/pkg/xgoja/providers/http
modules:
  - package: go-go-goja-http
    name: express
commands:
  jsverbs:
    enabled: true
    name: verbs
  eval:
    enabled: false
  run:
    enabled: false
  repl:
    enabled: false
commandProviders:
  - id: http-serve
    package: go-go-goja-http
    name: serve
    mount: serve
jsverbs:
  - id: local-sites
    path: ./verbs
    embed: true
