schema: xgoja/v2
name: http-serve-jsverbs
app:
  name: http-serve-jsverbs
go:
  module: xgoja.generated/http-serve-jsverbs
  version: "1.26"
workspace:
  mode: auto
providers:
  - id: go-go-goja-http
    import: github.com/go-go-golems/go-go-goja/pkg/xgoja/providers/http
    register: Register
runtime:
  modules:
    - provider: go-go-goja-http
      name: express
      config:
        reject-raw-routes: true
        dev-errors: false
sources:
  - id: local-sites
    kind: jsverbs
    from:
      dir: ./verbs
    language: javascript
commands:
  - id: verbs
    type: builtin.jsverbs
    name: verbs
    sources:
      - local-sites
  - id: http-serve
    type: provider.command-set
    name: serve
    mount: serve
    provider: go-go-goja-http
    sources:
      - local-sites
artifacts:
  - id: binary
    type: binary
    output: dist/http-serve-jsverbs
    sources:
      - local-sites
