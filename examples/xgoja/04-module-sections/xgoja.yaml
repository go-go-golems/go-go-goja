name: module-sections
target:
  kind: xgoja
  output: dist/module-sections
packages:
- id: fixture
  import: github.com/go-go-golems/go-go-goja/pkg/xgoja/testprovider
commands:
  eval:
    enabled: true
  run:
    enabled: true
  jsverbs:
    enabled: true
    name: verbs
  repl:
    enabled: true
jsverbs:
- id: local
  path: ./verbs
  embed: true
modules:
- package: fixture
  name: hello
  as: hello
