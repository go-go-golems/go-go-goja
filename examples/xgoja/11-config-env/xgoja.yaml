    version: "1.26"
workspace:
    mode: auto
providers:
    - id: fixture
      import: github.com/go-go-golems/go-go-goja/pkg/xgoja/testprovider
      register: Register
runtime:
    modules:
        - provider: fixture
          name: hello
          as: hello
