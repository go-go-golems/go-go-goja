name: embedded-jsverbs
target:
  kind: xgoja
  output: dist/embedded-jsverbs
packages:
  - id: fixture
    import: github.com/go-go-golems/go-go-goja/pkg/xgoja/testprovider
runtimes:
  repl:
    modules:
      - package: fixture
        name: hello
        as: hello
commands:
  repl:
    enabled: true
    runtime: repl
  jsverbs:
    enabled: true
    runtime: repl
    name: verbs
jsverbs:
  - id: local
    path: ./verbs
    embed: true
