name: provider-shipped-jsverbs
target:
  kind: xgoja
  output: dist/provider-shipped-jsverbs
packages:
- id: fixture
  import: github.com/go-go-golems/go-go-goja/pkg/xgoja/testprovider
commands:
  eval:
    enabled: true
  run:
    enabled: true
  jsverbs:
    enabled: true
    name: verbs
  repl:
    enabled: true
jsverbs:
- id: provider-defaults
  package: fixture
  source: verbs
modules:
- package: fixture
  name: hello
  as: hello
- package: fixture
  name: owner-check
  as: owner-check
