schema: xgoja/v2
name: provider-shipped-jsverbs
app:
    name: provider-shipped-jsverbs
go:
    module: xgoja.generated/provider-shipped-jsverbs
    version: "1.26"
workspace:
    mode: auto
providers:
    - id: fixture
      import: github.com/go-go-golems/go-go-goja/pkg/xgoja/testprovider
      register: Register
runtime:
    modules:
        - provider: fixture
          name: hello
          as: hello
        - provider: fixture
          name: owner-check
          as: owner-check
sources:
    - id: provider-defaults
      kind: jsverbs
      from:
        provider:
            provider: fixture
            source: verbs
      language: javascript
commands:
    - id: eval
      type: builtin.eval
      name: eval
    - id: run
      type: builtin.run
      name: run
    - id: repl
      type: builtin.repl
      name: repl
    - id: verbs
      type: builtin.jsverbs
      name: verbs
      sources:
        - provider-defaults
artifacts:
    - id: binary
      type: binary
      output: dist/provider-shipped-jsverbs
