name: runtime-filesystem
target:
  kind: xgoja
  output: dist/runtime-filesystem
packages:
- id: fixture
  import: github.com/go-go-golems/go-go-goja/pkg/xgoja/testprovider
commands:
  eval:
    enabled: true
  run:
    enabled: true
  jsverbs:
    enabled: true
    name: verbs
  repl:
    enabled: true
jsverbs:
- id: local-dev
  path: ./verbs
  embed: false
modules:
- package: fixture
  name: hello
  as: hello
