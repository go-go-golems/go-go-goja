schema: xgoja/v2
name: single-runtime-modules
app:
    name: single-runtime-modules
go:
    module: xgoja.generated/single-runtime-modules
    version: "1.26"
workspace:
    mode: auto
providers:
    - id: go-go-goja-core
      import: github.com/go-go-golems/go-go-goja/pkg/xgoja/providers/core
      register: Register
    - id: go-go-goja-host
      import: github.com/go-go-golems/go-go-goja/pkg/xgoja/providers/host
      register: Register
runtime:
    modules:
        - provider: go-go-goja-core
          name: path
          as: path
        - provider: go-go-goja-host
          name: fs
          as: fs
          config:
            allow: true
        - provider: go-go-goja-core
          name: yaml
          as: yaml
commands:
    - id: eval
      type: builtin.eval
      name: eval
    - id: run
      type: builtin.run
      name: run
    - id: repl
      type: builtin.repl
      name: repl
artifacts:
    - id: binary
      type: binary
      output: dist/single-runtime-modules
