name: single-runtime-modules
target:
  kind: xgoja
  output: dist/single-runtime-modules
packages:
- id: go-go-goja-core
  import: github.com/go-go-golems/go-go-goja/pkg/xgoja/providers/core
- id: go-go-goja-host
  import: github.com/go-go-golems/go-go-goja/pkg/xgoja/providers/host
commands:
  eval:
    enabled: true
  run:
    enabled: true
  repl:
    enabled: true
modules:
- package: go-go-goja-core
  name: path
  as: path
- package: go-go-goja-host
  name: fs
  as: fs
  config:
    allow: true
- package: go-go-goja-core
  name: yaml
  as: yaml
