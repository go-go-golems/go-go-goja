schema: xgoja/v2
name: core-provider
app:
    name: core-provider
go:
    module: xgoja.generated/core-provider
    version: "1.26"
workspace:
    mode: auto
providers:
    - id: go-go-goja-core
      import: github.com/go-go-golems/go-go-goja/pkg/xgoja/providers/core
      register: Register
runtime:
    modules:
        - provider: go-go-goja-core
          name: path
          as: path
        - provider: go-go-goja-core
          name: yaml
          as: yaml
        - provider: go-go-goja-core
          name: crypto
          as: crypto
commands:
    - id: eval
      type: builtin.eval
      name: eval
    - id: run
      type: builtin.run
      name: run
    - id: repl
      type: builtin.repl
      name: repl
artifacts:
    - id: binary
      type: binary
      output: dist/core-provider
