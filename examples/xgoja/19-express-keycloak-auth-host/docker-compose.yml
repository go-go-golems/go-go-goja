services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: goja_auth
      POSTGRES_USER: goja
      POSTGRES_PASSWORD: goja
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goja -d goja_auth"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - postgres-data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - "${KEYCLOAK_PORT:-18080}:8080"
    volumes:
      - ./keycloak/realm-goja-demo.json:/opt/keycloak/data/import/realm-goja-demo.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080; echo -e 'GET /realms/goja-demo/.well-known/openid-configuration HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3; grep -q 'issuer' <&3"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  postgres-data:
