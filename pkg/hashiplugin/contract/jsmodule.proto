syntax = "proto3";

package hashiplugin.contract.v1;

option go_package = "github.com/go-go-golems/go-go-goja/pkg/hashiplugin/contract;contract";

import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";

service JSModuleService {
  rpc GetManifest(google.protobuf.Empty) returns (ModuleManifest);
  rpc Invoke(InvokeRequest) returns (InvokeResponse);
}

enum ExportKind {
  EXPORT_KIND_UNSPECIFIED = 0;
  EXPORT_KIND_FUNCTION = 1;
  EXPORT_KIND_OBJECT = 2;
}

message ModuleManifest {
  string module_name = 1;
  string version = 2;
  repeated ExportSpec exports = 3;
  repeated string capabilities = 4;
  string doc = 5;
}

message ExportSpec {
  string name = 1;
  ExportKind kind = 2;
  repeated string methods = 3;
  string doc = 4;
}

message InvokeRequest {
  string export_name = 1;
  string method_name = 2;
  repeated google.protobuf.Value args = 3;
}

message InvokeResponse {
  google.protobuf.Value result = 1;
}
